<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- Circular Lens -->
  <circle cx="50" cy="50" r="45" stroke="url(#gradient)" stroke-width="8" />
  <circle cx="50" cy="50" r="35" fill="url(#gradient)" fill-opacity="0.1" />

  <!-- Resume Document -->
  <rect x="35" y="30" width="30" height="40" rx="3" stroke="url(#gradient)" stroke-width="4" fill="white" fill-opacity="0.05" />
  <line x1="40" y1="40" x2="60" y2="40" stroke="url(#gradient)" stroke-width="3" stroke-linecap="round" />
  <line x1="40" y1="50" x2="60" y2="50" stroke="url(#gradient)" stroke-width="3" stroke-linecap="round" />
  <line x1="40" y1="60" x2="52" y2="60" stroke="url(#gradient)" stroke-width="3" stroke-linecap="round" />

  <!-- AI Nodes -->
  <circle cx="20" cy="50" r="4" fill="#3B82F6" />
  <circle cx="80" cy="50" r="4" fill="#8B5CF6" />
  <circle cx="50" cy="15" r="4" fill="#3B82F6" />
  <circle cx="50" cy="85" r="4" fill="#8B5CF6" />
</svg>
